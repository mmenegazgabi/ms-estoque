name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: chave
          POSTGRES_PASSWORD: chave_secret
          POSTGRES_DB: chave_supplier_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U chave" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: chave
      DB_PASSWORD: chave_secret
      DB_NAME: chave_supplier_test
      JWT_SECRET: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run migrate:up
      - run: npm test
      - run: npm run build

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chave-ms-supplier:${{ github.ref_name }}
